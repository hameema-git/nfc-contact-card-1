<!DOCTYPE html>
<html>
<head>
    <title>Benson Maliakial</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
        }

        .container {
            max-width: 380px;
            margin: 0 auto;
            text-align: center;
        }

        /* HEADER */
        .header {
            background: #114f85;
            height: 230px;
            border-bottom-left-radius: 60px;
            border-bottom-right-radius: 60px;
        }

        /* AVATAR */
        .avatar {
            width: 120px;
            height: 120px;
            background: #f0f0f0;
            border-radius: 50%;
            margin: -60px auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            font-weight: 600;
            color: #114f85;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        h2 {
            margin: 5px 0;
            color: #114f85;
            font-size: 22px;
            font-weight: 600;
        }

        .subtitle {
            color: #8a8a8a;
            font-size: 14px;
            font-weight: 300;
        }

        .company {
            color: #7bbd2a;
            font-weight: 600;
            margin: 12px 0 30px;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        /* CONTACT LIST */
        .contact {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 18px 0;
        }

        .icon {
            width: 42px;
            height: 42px;
            background: #2ea44f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            flex-shrink: 0;
        }

        .text {
            text-align: left;
            color: #114f85;
            font-size: 15px;
        }

        /* LOGO */
        .logo {
            margin-top: 50px;
            display: flex;
            justify-content: center;
        }

        .logo img {
            width: 160px;
            object-fit: contain;
        }

        /* BUTTON */
        .btn {
            margin: 35px auto 20px;
            display: block;
            width: 80%;
            padding: 14px;
            background: linear-gradient(45deg, #1e73e8, #2f80ed);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
        }

    </style>
</head>

<body>

    <div class="header"></div>

    <div class="container">

        <div class="avatar">B</div>

        <h2>Benson Maliakial</h2>
        <div class="subtitle">Founder & CEO</div>
        <div class="company">EDUCARE INTERNATIONAL</div>

        <div class="contact">
            <div class="icon"><i class="fas fa-phone"></i></div>
            <div class="text">+971503603251</div>
        </div>

        <div class="contact">
            <div class="icon"><i class="fas fa-envelope"></i></div>
            <div class="text">benson@educareintl.com</div>
        </div>

        <div class="contact">
            <div class="icon"><i class="fas fa-globe"></i></div>
            

<div class="text">
    <a href="https://www.educareintl.com" target="_blank">
        www.educareintl.com
    </a>
</div>

        </div>


        <div class="contact">
            <div class="icon"><i class="fas fa-location-dot"></i></div>
            <div class="text">1904, ADCP Business Tower, Office Suite 1904</div>
        </div>

        <div class="logo">
            <img src="logo.png" alt="logo">
        </div>

        <a href="benson.vcf" class="btn">Add to Contacts</a>

    </div>

</body>
</html>
